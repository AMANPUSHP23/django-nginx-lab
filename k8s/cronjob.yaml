apiVersion: batch/v1
kind: CronJob

metadata:
  name: backup-job

spec:
  schedule: "*/1 * * * *"

  jobTemplate:

    spec:

      template:

        spec:

          containers:

          - name: backup

            image: busybox

            command:
            - /bin/sh
            - -c
            - date > /tmp/backup.txt && echo "Backup Completed"

          restartPolicy: OnFailure
